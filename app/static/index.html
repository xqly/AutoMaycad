<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoMaycad 货架任务</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="app-title">
        <div class="header">
          <div>
            <p class="eyebrow">MAYCAD 场景生成器</p>
            <h1 id="app-title">AutoMaycad 货架任务</h1>
          </div>
          <div class="header-actions">
            <div id="account-panel" class="account-panel" hidden>
              <span id="account-name"></span>
              <button id="logout" type="button">退出</button>
            </div>
            <nav class="top-nav" aria-label="Primary" hidden>
              <a href="/" data-route>新建任务</a>
              <a href="/jobs" data-route>任务列表</a>
              <a href="/account" data-route>个人中心</a>
            </nav>
            <button class="icon-button" id="refresh" type="button" aria-label="刷新任务" title="刷新任务" hidden>
              <span aria-hidden="true">&#8635;</span>
            </button>
          </div>
        </div>

        <form id="login-form" class="login-panel app-view" aria-labelledby="login-title">
          <div>
            <p class="eyebrow">账号登录</p>
            <h2 id="login-title">登录后查看和创建任务</h2>
          </div>
          <label for="username">账号</label>
          <input id="username" name="username" type="text" autocomplete="username" value="admin" required />
          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <div class="actions">
            <p id="login-status" role="status" aria-live="polite"></p>
            <button id="login-submit" type="submit">登录</button>
          </div>
        </form>

        <form id="prompt-form" class="composer app-view">
          <label for="prompt">货架需求</label>
          <textarea id="prompt" name="prompt" rows="8" maxlength="20000" placeholder="示例：长 2000 mm、深 600 mm、高 1800 mm 的铝型材货架，4 层，3 跨，中密度纤维板层板..." required></textarea>
          <div class="image-uploader">
            <label for="images">参考图片</label>
            <input id="images" name="images" type="file" accept="image/png,image/jpeg,image/webp,image/gif" multiple />
            <div id="image-list" class="image-list" aria-live="polite"></div>
          </div>
          <div class="actions">
            <p id="form-status" role="status" aria-live="polite"></p>
            <button id="submit" type="submit">创建任务</button>
          </div>
        </form>

        <section id="jobs-view" class="jobs-panel app-view" aria-labelledby="jobs-title" hidden>
          <div class="jobs-header">
            <h2 id="jobs-title">任务列表</h2>
            <span id="job-count">0</span>
          </div>
          <div id="jobs" class="jobs" aria-live="polite"></div>
        </section>

        <section id="job-view" class="jobs-panel app-view" aria-labelledby="job-title" hidden>
          <div class="jobs-header">
            <div>
              <p class="eyebrow">任务详情</p>
              <h2 id="job-title">任务</h2>
            </div>
            <a class="text-link" href="/jobs" data-route>全部任务</a>
          </div>
          <div id="job-detail" class="jobs" aria-live="polite"></div>
        </section>

        <section id="account-view" class="account-view app-view" aria-labelledby="account-title" hidden>
          <div class="section-header">
            <div>
              <p class="eyebrow">个人中心</p>
              <h2 id="account-title">账号设置</h2>
            </div>
          </div>

          <form id="password-form" class="settings-form">
            <h3>修改密码</h3>
            <label for="current-password">当前密码</label>
            <input id="current-password" name="current-password" type="password" autocomplete="current-password" required />
            <label for="new-password">新密码</label>
            <input id="new-password" name="new-password" type="password" autocomplete="new-password" required />
            <label for="confirm-password">确认新密码</label>
            <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" required />
            <div class="actions">
              <p id="password-status" role="status" aria-live="polite"></p>
              <button id="password-submit" type="submit">保存密码</button>
            </div>
          </form>

          <section id="admin-users-panel" class="admin-users-panel" hidden>
            <form id="user-form" class="settings-form">
              <h3>添加账号</h3>
              <label for="new-username">账号</label>
              <input id="new-username" name="new-username" type="text" autocomplete="off" required />
              <label for="new-user-password">初始密码</label>
              <input id="new-user-password" name="new-user-password" type="password" autocomplete="new-password" required />
              <div class="actions">
                <p id="user-status" role="status" aria-live="polite"></p>
                <button id="user-submit" type="submit">添加账号</button>
              </div>
            </form>

            <section class="users-list-panel" aria-labelledby="users-title">
              <div class="section-header">
                <h3 id="users-title">账号列表</h3>
                <button id="users-refresh" type="button">刷新</button>
              </div>
              <div id="users-list" class="users-list" aria-live="polite"></div>
            </section>
          </section>
        </section>
      </section>
    </main>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <script src="/static/app.js"></script>
  </body>
</html>
